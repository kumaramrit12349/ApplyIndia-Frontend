name: Deploy React Frontend (PROD)

on:
  push:
    branches:
      - prodAWS

jobs:
  deploy:
    name: Build & Deploy Frontend (PROD)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional

      - name: Rebuild Rollup
        run: npm rebuild rollup

      - name: Build React app
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_VITE_API_BASE_URL }}
          VITE_ENV: prod
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      - name: Upload static assets to S3
        run: |
          aws s3 sync dist s3://${{ secrets.PROD_S3_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --cache-control "max-age=31536000,public"

      - name: Upload index.html to S3
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.PROD_S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
